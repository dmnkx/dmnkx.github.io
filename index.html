<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>doobeom Portfolio</title>
  <meta name="description" content="두범(doobeom) 포트폴리오 — IaC, CI/CD, 모바일 앱 아키텍처" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/nav.css" />
  <style>
    :root {
      --bg: #0c1118;
      --surface: #151c28;
      --border: #2a3a4f;
      --text: #e6edf5;
      --muted: #8a9bb0;
      --accent: #3d8bfd;
      --accent-2: #22d3ee;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "IBM Plex Sans KR", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--pf-nav-h);
    }

    .pf-nav {
      /* occupied by fixed nav; shell accounts for height */
    }

    .viewer {
      flex: 1;
      width: 100%;
      border: 0;
      background: var(--bg);
      display: block;
    }

    /* Landing (no hash / home) */
    .landing {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem 1.5rem 4rem;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(61, 139, 253, 0.14), transparent 55%),
        radial-gradient(ellipse 50% 40% at 95% 10%, rgba(34, 211, 238, 0.08), transparent 50%),
        var(--bg);
    }

    .landing.hidden { display: none; }
    .viewer.hidden { display: none; }

    .landing-inner {
      max-width: 960px;
      margin: 0 auto;
    }

    .landing-brand {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .landing h1 {
      font-size: clamp(1.25rem, 2.5vw, 1.65rem);
      font-weight: 600;
      margin-bottom: 0.65rem;
    }

    .landing .lead {
      color: var(--muted);
      font-size: 1rem;
      max-width: 42rem;
      line-height: 1.65;
      margin-bottom: 2.25rem;
    }

    .group-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.75rem 0 0.85rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.85rem;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.15rem 1.2rem;
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: #1a2433;
      transform: translateY(-2px);
    }

    .card strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
    }

    .card span {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .card .file {
      display: block;
      margin-top: 0.7rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.68rem;
      color: var(--accent-2);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="pf-nav" aria-label="포트폴리오 탭" id="top-nav">
      <a class="pf-nav__brand" href="#home"><span>doobeom</span> Portfolio</a>
      <div class="pf-nav__tabs" role="tablist" id="tab-list"></div>
    </nav>

    <main class="landing" id="landing">
      <div class="landing-inner">
        <div class="landing-brand">doobeom</div>
        <h1>포트폴리오</h1>
        <p class="lead">
          IaC·CI/CD·자동화 인프라와 모바일 앱 아키텍처를 정리한 문서모음입니다.
          상단 탭으로 각 프로젝트를 바로 열 수 있습니다.
        </p>

        <div class="group-label">doobeom — Infra &amp; CI</div>
        <div class="cards" id="cards-doobeom"></div>

        <div class="group-label">doobeom — Mobile</div>
        <div class="cards" id="cards-mobile"></div>
      </div>
    </main>

    <iframe class="viewer hidden" id="viewer" title="포트폴리오 뷰어"></iframe>
  </div>

  <script src="assets/js/catalog.js"></script>
  <script>
    (function () {
      var PORTFOLIOS = window.PORTFOLIOS || [];

      var tabList = document.getElementById("tab-list");
      var landing = document.getElementById("landing");
      var viewer = document.getElementById("viewer");
      var cardsDoobeom = document.getElementById("cards-doobeom");
      var cardsMobile = document.getElementById("cards-mobile");

      PORTFOLIOS.forEach(function (item) {
        var a = document.createElement("a");
        a.href = "#" + item.id;
        a.textContent = item.label;
        a.dataset.id = item.id;
        a.setAttribute("role", "tab");
        tabList.appendChild(a);

        var card = document.createElement("a");
        card.className = "card";
        card.href = "#" + item.id;
        card.innerHTML =
          "<strong>" + item.label + "</strong>" +
          "<span>" + item.desc + "</span>" +
          "<span class=\"file\">" + item.file + "</span>";
        (item.group === "doobeom" ? cardsDoobeom : cardsMobile).appendChild(card);
      });

      function showHome() {
        landing.classList.remove("hidden");
        viewer.classList.add("hidden");
        viewer.removeAttribute("src");
        tabList.querySelectorAll("a").forEach(function (el) {
          el.classList.remove("is-active");
          el.setAttribute("aria-selected", "false");
        });
        document.title = "doobeom Portfolio";
      }

      function showPortfolio(item) {
        landing.classList.add("hidden");
        viewer.classList.remove("hidden");
        if (viewer.getAttribute("src") !== item.file) {
          viewer.src = item.file;
        }
        tabList.querySelectorAll("a").forEach(function (el) {
          var on = el.dataset.id === item.id;
          el.classList.toggle("is-active", on);
          el.setAttribute("aria-selected", on ? "true" : "false");
        });
        document.title = item.label + " — doobeom Portfolio";
      }

      function route() {
        var hash = (location.hash || "").replace(/^#/, "");
        if (!hash || hash === "home") {
          showHome();
          return;
        }
        var item = PORTFOLIOS.find(function (p) { return p.id === hash; });
        if (item) showPortfolio(item);
        else showHome();
      }

      window.addEventListener("hashchange", route);
      route();
    })();
  </script>
</body>
</html>
